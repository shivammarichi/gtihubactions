# ═══════════════════════════════════════════════════════════════════════════════
# GitHub Actions Workflow
# ───────────────────────
# File location: .github/workflows/ci.yml
#
# What this pipeline does (in order):
#   1.  Checkout source code
#   2.  Set up Java 17
#   3.  Cache Maven dependencies (speed)
#   4.  Run tests  →  fail fast if tests break
#   5.  Package the fat JAR with Maven
#   6.  Upload the JAR as a workflow artifact (downloadable from GitHub UI)
#   7.  Log in to Docker Hub using SECRETS (never hardcoded)
#   8.  Build the Docker image (multi-stage Dockerfile)
#   9.  Push the image to Docker Hub
#  10.  Print the image pull command so you can run it anywhere
# ═══════════════════════════════════════════════════════════════════════════════

name: CI — Build, Test, Package & Push Docker Image

# ── TRIGGERS ──────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # Run on every push to main
      - develop       # Run on every push to develop
  pull_request:
    branches:
      - main          # Run on every PR targeting main (does NOT push image)
  workflow_dispatch:  # Allow manual runs from the GitHub Actions UI

# ── GLOBAL ENV VARS ───────────────────────────────────────────────────────────
# These are NOT secrets — safe to hardcode here.
env:
  JAVA_VERSION: '17'
  IMAGE_NAME: springboot-demo          # Docker Hub image name (repo name)
  # DOCKER_USERNAME is set as a secret — we reference it below

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — TEST
# ─────────────
# Runs on every push AND every PR.
# If tests fail, the pipeline stops here — Docker image is never built.
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Get the source code onto the runner ──
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Step 2: Install Java 17 on the runner ──
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin          # Eclipse Temurin (AdoptOpenJDK)
          cache: maven                   # Automatically cache ~/.m2 based on pom.xml hash

      # ── Step 3: Run tests ──
      # 'mvn test' compiles + runs all @Test methods.
      # If any test fails, exit code is non-zero → step fails → job fails → pipeline stops.
      - name: Run tests
        run: mvn test -B

      # ── Step 4: Publish test results in the GitHub UI ──
      # This shows a test summary tab on the workflow run page.
      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()    # Show report even if tests failed
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — BUILD & PACKAGE
# ───────────────────────
# Only runs after 'test' job succeeds.
# Produces the fat JAR and uploads it as a GitHub Actions artifact.
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: 📦 Build & Package JAR
    runs-on: ubuntu-latest
    needs: test           # ← Wait for test job to pass first

    # Output the JAR filename so the docker job can reference it
    outputs:
      jar-name: ${{ steps.jar-info.outputs.jar-name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── Package: compile + test (already passed) + create fat JAR ──
      # -DskipTests: tests already ran in the 'test' job, skip here to save time
      - name: Package with Maven (skip tests)
        run: mvn clean package -B -DskipTests

      # ── Capture the JAR filename for later steps ──
      - name: Get JAR filename
        id: jar-info
        run: |
          JAR=$(ls target/*.jar | grep -v original | head -1)
          echo "jar-name=$(basename $JAR)" >> $GITHUB_OUTPUT
          echo "JAR file: $JAR"

      # ── Upload the JAR so it can be downloaded from GitHub UI ──
      # Go to: Actions → your run → Artifacts section → download springboot-jar
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar
          if-no-files-found: error     # Fail loudly if no JAR was produced
          retention-days: 7            # Keep artifact for 7 days

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — DOCKER BUILD & PUSH
# ────────────────────────────
# Runs after 'build' succeeds.
# Skipped on Pull Requests (we don't want to push an image from a PR).
# ═══════════════════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build          # ← Wait for build job to pass

    # ── IMPORTANT: Skip Docker push on Pull Requests ──
    # PRs come from forks and do NOT have access to our secrets.
    # If we tried to push, it would fail with a credentials error.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Compute a short version tag from the git commit SHA ──
      # github.sha = full 40-char SHA  →  we take the first 7 chars
      # Example: "a3f9b12"
      # We also create a "branch-safe" tag (replaces / with -)
      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"    # replace "/" with "-"
          echo "short-sha=${SHORT_SHA}"        >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"              >> $GITHUB_OUTPUT
          echo "Image will be tagged: ${SHORT_SHA} and ${BRANCH}"

      # ── Log in to Docker Hub ──
      # secrets.DOCKER_USERNAME and secrets.DOCKER_PASSWORD are set in:
      # GitHub repo → Settings → Secrets and variables → Actions → New secret
      #
      # NEVER put actual credentials here. The ${{ secrets.X }} syntax
      # reads from the encrypted secrets store — values are masked in logs.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # ↑ Use an Access Token, NOT your account password.
          # Generate one at: https://hub.docker.com → Account Settings → Security

      # ── Set up Docker Buildx ──
      # Buildx is the modern Docker build engine.
      # It enables multi-platform builds and better layer caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build the Docker image and push to Docker Hub ──
      # The Dockerfile is in the repo root.
      # We pass APP_VERSION as a build-arg so the running container knows its version.
      #
      # Tags applied to this image:
      #   yourusername/springboot-demo:a3f9b12   ← exact commit (immutable, great for rollbacks)
      #   yourusername/springboot-demo:main       ← branch name (moves forward)
      #   yourusername/springboot-demo:latest     ← always the newest build on main
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.tags.outputs.short-sha }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.short-sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.branch }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          # Cache layers between builds — makes subsequent builds much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Print the pull command for convenience ──
      - name: Print image info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Docker image pushed successfully!"
          echo ""
          echo "Pull & run your image:"
          echo "  docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "  docker run -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Test it:"
          echo "  curl http://localhost:8080/api/products"
          echo "  curl http://localhost:8080/api/products/1"
          echo "  curl http://localhost:8080/api/health"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
